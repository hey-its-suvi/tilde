<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tilde — Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: monospace;
      background: #f5f5f0;
      color: #1a1a2e;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1a1a2e;
      color: #f5f5f0;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    header span { opacity: 0.5; font-size: 0.85rem; margin-left: 8px; }

    header a.docs-link {
      font-size: 0.8rem;
      color: #f5f5f0;
      opacity: 0.5;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    header a.docs-link:hover { opacity: 1; }

    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .canvas-pane {
      flex: 1;
      position: relative;
      border-right: 1px solid #ddd;
    }

    canvas#canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .resize-handle {
      width: 5px;
      flex-shrink: 0;
      background: #ddd;
      cursor: col-resize;
      transition: background 0.15s;
    }
    .resize-handle:hover { background: #aaa; }

    .editor-pane {
      display: flex;
      flex-direction: column;
      width: 380px;
      min-width: 200px;
    }

    .editor-toolbar {
      display: flex;
      justify-content: flex-end;
      padding: 4px 8px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .editor-toolbar button {
      font-family: monospace;
      font-size: 11px;
      padding: 2px 8px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 3px;
      cursor: pointer;
      color: #666;
    }
    .editor-toolbar button:hover { border-color: #999; color: #333; }

    #editor {
      flex: 1;
      overflow: hidden;
    }

    .console {
      height: 120px;
      flex-shrink: 0;
      border-top: 1px solid #ddd;
      padding: 8px 12px;
      overflow-y: auto;
      font-size: 12px;
      background: #1a1a2e;
      color: #a0ffa0;
    }

    .console .error { color: #ff8080; }
    .console .info  { color: #a0ffa0; }

    .hover-tooltip {
      position: absolute;
      background: rgba(26,26,46,0.85);
      color: #f5f5f0;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div>~tilde <span>geometric language playground</span></div>
    <a class="docs-link" href="/">docs →</a>
  </header>
  <div class="workspace">
    <div class="canvas-pane">
      <canvas id="canvas"></canvas>
      <div class="hover-tooltip" id="tooltip"></div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="editor-pane">
      <div class="editor-toolbar">
        <button id="reset-btn">reset</button>
      </div>
      <div id="editor"></div>
      <div class="console" id="console"></div>
    </div>
  </div>
  <script type="module" src="/src/playground/main.ts"></script>
</body>
</html>
